<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Holi - Aayu</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
    background:black;
}

/* Top Bar */
.topbar{
    position:fixed;
    top:0;
    width:100%;
    background:black;
    color:white;
    text-align:center;
    padding:6px;
    font-weight:bold;
    z-index:10;
}

/* Animated Background */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(45deg,#ff0080,#ff8c00,#00f2ff,#ff1493);
    background-size:400% 400%;
    animation:bgMove 8s infinite alternate;
    z-index:-2;
}
@keyframes bgMove{
    0%{background-position:left;}
    100%{background-position:right;}
}

/* 3D Title */
h1{
    margin-top:20vh;
    text-align:center;
    font-size:50px;
    color:white;
    text-shadow:3px 3px 0 #ff0080,6px 6px 15px rgba(0,0,0,0.6);
    animation:float 3s ease-in-out infinite;
}
@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
}

/* Lyrics */
#lyrics{
    text-align:center;
    margin-top:20px;
    font-size:24px;
    min-height:40px;
}

/* Jump Animation */
.jump{
    display:inline-block;
    animation:jump 0.3s ease;
}
@keyframes jump{
    50%{transform:translateY(-10px);}
}

/* Cursor */
.cursor{
    display:inline-block;
    width:3px;
    background:white;
    margin-left:3px;
    animation:blink 0.7s infinite;
}
@keyframes blink{
    50%{opacity:0;}
}

/* Rain */
.drop{
    position:absolute;
    top:-20px;
    width:6px;
    height:20px;
    border-radius:50%;
    animation:fall linear forwards;
}
@keyframes fall{
    to{transform:translateY(110vh);}
}

/* Gulal */
.particle{
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    pointer-events:none;
    animation:explode 1s ease-out forwards;
}
@keyframes explode{
    to{
        transform:translate(var(--x),var(--y)) scale(2);
        opacity:0;
    }
}

/* About Box */
#introBox{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:black;
    padding:30px;
    border-radius:20px;
    width:85%;
    max-width:420px;
    display:none;
    text-align:center;
    box-shadow:0 0 40px #ff00ff;
    z-index:20;
}

#musicBtn{
    position:fixed;
    bottom:20px;
    right:20px;
    font-size:30px;
    background:none;
    border:none;
    cursor:pointer;
}

#aboutBtn{
    position:fixed;
    bottom:20px;
    left:20px;
    padding:8px 15px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="topbar">✨ Made by Aayu ✨</div>

<h1>Happy Holi Mere Dosto</h1>
<div id="lyrics"></div>

<button id="aboutBtn" onclick="showIntro()">About</button>
<button id="musicBtn">🎵</button>

<div id="introBox">
    <button onclick="closeIntro()" style="position:absolute;top:5px;right:10px;background:red;color:white;border:none;border-radius:50%;">X</button>
    <div id="introText"></div>
</div>

<audio id="music" src="holi.mp3" preload="auto"></audio>

<script>
const music=document.getElementById("music");
const lyrics=document.getElementById("lyrics");
const musicBtn=document.getElementById("musicBtn");
const introText=document.getElementById("introText");

let isPlaying=false;
let currentLine="";

/* Random Color */
function randomColor(){
    const colors=["red","yellow","blue","green","pink","orange","cyan"];
    return colors[Math.floor(Math.random()*colors.length)];
}

/* Typing Effect */
function typeLine(text,target){
    if(currentLine===text) return;
    currentLine=text;
    target.innerHTML="";
    let i=0;

    let cursor=document.createElement("span");
    cursor.className="cursor";

    let typing=setInterval(()=>{
        if(i<text.length){
            let span=document.createElement("span");
            span.innerText=text[i];
            span.style.color=randomColor();
            span.classList.add("jump");
            target.appendChild(span);
            i++;
        }else{
            clearInterval(typing);
        }
    },50);

    target.appendChild(cursor);
}

/* Music Button */
musicBtn.addEventListener("click",function(){
    if(!isPlaying){
        music.currentTime=0;
        music.play();
        isPlaying=true;
        musicBtn.innerText="⏸";
    }else{
        music.pause();
        isPlaying=false;
        musicBtn.innerText="🎵";
    }
});

/* Lyrics Sync */
music.ontimeupdate=function(){
    let t=music.currentTime;

    if(t<10)
        typeLine("Balam Pichkari Jo Tune Mujhe Maari",lyrics);
    else if(t<20)
        typeLine("To Seedhi Saadi Chhori Sharabi Ho Gayi",lyrics);
};

/* Rain */
function createRain(){
    const drop=document.createElement("div");
    drop.classList.add("drop");
    drop.style.left=Math.random()*100+"vw";
    drop.style.background=randomColor();
    drop.style.animationDuration=(Math.random()*2+2)+"s";
    document.body.appendChild(drop);
    setTimeout(()=>drop.remove(),4000);
}
setInterval(createRain,100);

/* Gulal */
document.addEventListener("click",function(e){
    for(let i=0;i<10;i++){
        const p=document.createElement("div");
        p.classList.add("particle");
        p.style.left=e.clientX+"px";
        p.style.top=e.clientY+"px";
        p.style.background=randomColor();
        p.style.setProperty("--x",(Math.random()*160-80)+"px");
        p.style.setProperty("--y",(Math.random()*160-80)+"px");
        document.body.appendChild(p);
        setTimeout(()=>p.remove(),1000);
    }
});

/* About */
function showIntro(){
    document.getElementById("introBox").style.display="block";
    typeLine("Hi\u00A0\u00A0I\u00A0\u00A0am\u00A0\u00A0Aayu\u00A0\u00A0👋\u00A0\u00A0Aap\u00A0\u00A0sabko\u00A0\u00A0aapke\u00A0\u00A0friend\u00A0\u00A0Web\u00A0\u00A0Developer\u00A0\u00A0Aayu\u00A0\u00A0ki\u00A0\u00A0or\u00A0\u00A0se\u00A0\u00A0Happy\u00A0\u00A0Holi\u00A0\u00A0💸🌈",introText);
}

function closeIntro(){
    document.getElementById("introBox").style.display="none";
}
</script>

</body>
</html>
