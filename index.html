<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Holi - Aayu</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:black;
}

/* Top Bar */
#topBar{
    position:fixed;
    top:0;
    width:100%;
    height:40px;
    background:black;
    color:white;
    text-align:center;
    line-height:40px;
    font-weight:bold;
    z-index:1000;
}

/* Animated Background */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(45deg,#ff0080,#ff8c00,#00f2ff,#ff1493);
    background-size:400% 400%;
    animation:bgMove 8s infinite alternate;
    z-index:-2;
}
@keyframes bgMove{
    0%{background-position:left;}
    100%{background-position:right;}
}

/* Title */
h1{
    margin-top:22vh;
    text-align:center;
    font-size:50px;
    color:white;
    text-transform:uppercase;
    text-shadow:0 0 20px red;
    animation:float 3s ease-in-out infinite;
}
@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-12px);}
}

/* Lyrics */
#lyrics{
    text-align:center;
    margin-top:20px;
    font-size:24px;
    min-height:50px;
    font-weight:bold;
}

/* Cursor */
.cursor{
    display:inline-block;
    width:3px;
    background:white;
    margin-left:4px;
    animation:blink 0.7s infinite;
}
@keyframes blink{
    50%{opacity:0;}
}

/* Letter Jump */
.jump{
    display:inline-block;
    animation:jump 0.3s ease;
}
@keyframes jump{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

/* Rain */
.drop{
    position:absolute;
    top:-20px;
    width:6px;
    height:20px;
    border-radius:50%;
    animation:fall linear forwards;
}
@keyframes fall{
    to{transform:translateY(110vh);}
}

/* Color Burst */
.burst{
    position:absolute;
    width:12px;
    height:12px;
    border-radius:50%;
    pointer-events:none;
    animation:explode 1s ease-out forwards;
}
@keyframes explode{
    to{
        transform:translate(var(--x),var(--y)) scale(3);
        opacity:0;
    }
}

/* Buttons */
button{
    position:absolute;
    padding:8px 15px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    font-weight:bold;
}
#aboutBtn{ top:60px; right:20px; }
#musicBtn{
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    font-size:22px;
}

/* About Box */
#introBox{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.95);
    padding:30px;
    border-radius:20px;
    width:85%;
    max-width:420px;
    display:none;
    text-align:center;
}
#closeBtn{
    position:absolute;
    top:8px;
    right:12px;
    background:red;
    color:white;
    border:none;
    border-radius:50%;
    width:25px;
    height:25px;
    cursor:pointer;
}
</style>
</head>
<body>

<div id="topBar">✨ Made by Aayu ✨</div>

<h1>Happy Holi Mere Dosto</h1>
<div id="lyrics"></div>

<button id="aboutBtn" onclick="showIntro()">About</button>
<button id="musicBtn" onclick="startMusic()">🎵</button>

<div id="introBox">
    <button id="closeBtn" onclick="closeIntro()">X</button>
    <div id="introText" style="font-size:20px;font-weight:bold;"></div>
</div>

<audio id="music" src="holi.mp3"></audio>

<script>
const music=document.getElementById("music");
const lyrics=document.getElementById("lyrics");
const introText=document.getElementById("introText");

let currentLine="";
let typingInterval;

/* Holi Colors */
function randomColor(){
    const colors=["red","yellow","blue","green","pink","orange","cyan"];
    return colors[Math.floor(Math.random()*colors.length)];
}

/* Typing Effect */
function typeLine(text,element){
    if(element.innerText.replace(/\u00A0/g,' ')===text.replace(/\u00A0/g,' ')) return;

    clearInterval(typingInterval);
    element.innerHTML="";
    let i=0;

    typingInterval=setInterval(()=>{
        if(i<text.length){
            let span=document.createElement("span");
            span.innerText=text[i];
            span.style.color=randomColor();
            span.classList.add("jump");
            element.appendChild(span);
            i++;
        }else{
            clearInterval(typingInterval);
            let cursor=document.createElement("span");
            cursor.classList.add("cursor");
            element.appendChild(cursor);
        }
    },50);
}

/* Lyrics Sync */
music.ontimeupdate=function(){
    let t=music.currentTime;
    if(t<10)
        typeLine("Balam Pichkari Jo Tune Mujhe Maari",lyrics);
    else if(t<20)
        typeLine("To Seedhi Saadi Chhori Sharabi Ho Gayi",lyrics);
    else
        typeLine("Happy Holi Mere Dosto 🎉",lyrics);
};

function startMusic(){
    music.play();
}

/* Rain */
function createRain(){
    const drop=document.createElement("div");
    drop.classList.add("drop");
    drop.style.left=Math.random()*100+"vw";
    drop.style.background=randomColor();
    drop.style.animationDuration=(Math.random()*2+2)+"s";
    document.body.appendChild(drop);
    setTimeout(()=>drop.remove(),4000);
}
setInterval(createRain,100);

/* Color Blast */
document.addEventListener("click",function(e){
    for(let i=0;i<15;i++){
        const b=document.createElement("div");
        b.classList.add("burst");
        b.style.left=e.clientX+"px";
        b.style.top=e.clientY+"px";
        b.style.background=randomColor();
        b.style.setProperty("--x",(Math.random()*200-100)+"px");
        b.style.setProperty("--y",(Math.random()*200-100)+"px");
        document.body.appendChild(b);
        setTimeout(()=>b.remove(),1000);
    }
});

/* About Section */
function showIntro(){
    document.getElementById("introBox").style.display="block";
    typeLine("Hi\u00A0\u00A0I\u00A0\u00A0am\u00A0\u00A0Aayu\u00A0\u00A0👋\u00A0\u00A0Aap\u00A0\u00A0sabko\u00A0\u00A0aapke\u00A0\u00A0friend\u00A0\u00A0Web\u00A0\u00A0Developer\u00A0\u00A0Aayu\u00A0\u00A0ki\u00A0\u00A0or\u00A0\u00A0se\u00A0\u00A0Happy\u00A0\u00A0Holi\u00A0\u00A0💸🌈",introText);
}

function closeIntro(){
    document.getElementById("introBox").style.display="none";
}
</script>

</body>
    </html>
